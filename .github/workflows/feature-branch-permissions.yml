name: Configure Feature Branch Write Permissions

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  configure-feature-branch-ruleset:
    name: Apply write-access ruleset for feature branches
    runs-on: ubuntu-latest
    permissions:
      contents: read
      administration: write

    steps:
      - name: Upsert repository ruleset – allow all users to push to feature branches
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          RULESET_NAME="feature-branch-write-all"

          # Check whether the ruleset already exists
          EXISTING=$(gh api \
            -H "Accept: application/vnd.github+json" \
            "/repos/${REPO}/rulesets" \
            --jq ".[] | select(.name==\"${RULESET_NAME}\") | .id" || { echo "Warning: failed to list rulesets; proceeding with create"; })

          # bypass_actor_id 2 = Write-level collaborators (GitHub RepositoryRole enum)
          # bypass_actor_id 4 = Admins (GitHub RepositoryRole enum)
          PAYLOAD=$(cat <<'EOF'
          {
            "name": "feature-branch-write-all",
            "target": "branch",
            "enforcement": "active",
            "conditions": {
              "ref_name": {
                "include": ["refs/heads/feature/**"],
                "exclude": []
              }
            },
            "bypass_actors": [
              {
                "actor_type": "RepositoryRole",
                "actor_id": 2,
                "bypass_mode": "always"
              },
              {
                "actor_type": "RepositoryRole",
                "actor_id": 4,
                "bypass_mode": "always"
              }
            ],
            "rules": []
          }
          EOF
          )

          if [ -n "$EXISTING" ]; then
            echo "Updating existing ruleset id=${EXISTING}"
            gh api \
              --method PUT \
              -H "Accept: application/vnd.github+json" \
              "/repos/${REPO}/rulesets/${EXISTING}" \
              --input - <<< "$PAYLOAD"
          else
            echo "Creating new ruleset"
            gh api \
              --method POST \
              -H "Accept: application/vnd.github+json" \
              "/repos/${REPO}/rulesets" \
              --input - <<< "$PAYLOAD"
          fi

      - name: Summary
        run: |
          echo "### Feature branch write permissions configured" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Repository ruleset **feature-branch-write-all** is active." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Scope | Pattern |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|---------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Branches | \`refs/heads/feature/**\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Bypass actors | Write collaborators, Admins |" >> "$GITHUB_STEP_SUMMARY"
