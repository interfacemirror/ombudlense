name: Configure Branch and PR Permissions

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  configure-permissions:
    name: Allow all users to create branches and submit PRs to main
    runs-on: ubuntu-latest
    permissions:
      contents: read
      administration: write

    steps:
      - name: Upsert ruleset – no restrictions on non-main branches
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          RULESET_NAME="allow-all-branch-creation"

          # Check whether the ruleset already exists
          EXISTING=$(gh api \
            -H "Accept: application/vnd.github+json" \
            "/repos/${REPO}/rulesets" \
            --jq '.[] | select(.name=="'"${RULESET_NAME}"'") | .id' 2>/dev/null || echo "")

          # Apply a ruleset that covers every branch except main with no rules,
          # so no push or creation restrictions apply to contributors.
          # bypass_actor_id 1 = Read collaborators
          # bypass_actor_id 2 = Write collaborators
          # bypass_actor_id 4 = Admins
          PAYLOAD=$(cat <<'EOF'
          {
            "name": "allow-all-branch-creation",
            "target": "branch",
            "enforcement": "active",
            "conditions": {
              "ref_name": {
                "include": ["~ALL"],
                "exclude": ["refs/heads/main"]
              }
            },
            "bypass_actors": [
              {
                "actor_type": "RepositoryRole",
                "actor_id": 1,
                "bypass_mode": "always"
              },
              {
                "actor_type": "RepositoryRole",
                "actor_id": 2,
                "bypass_mode": "always"
              },
              {
                "actor_type": "RepositoryRole",
                "actor_id": 4,
                "bypass_mode": "always"
              }
            ],
            "rules": []
          }
          EOF
          )

          if [ -n "$EXISTING" ]; then
            echo "Updating existing ruleset id=${EXISTING}"
            gh api \
              --method PUT \
              -H "Accept: application/vnd.github+json" \
              "/repos/${REPO}/rulesets/${EXISTING}" \
              --input - <<< "$PAYLOAD"
          else
            echo "Creating new ruleset"
            gh api \
              --method POST \
              -H "Accept: application/vnd.github+json" \
              "/repos/${REPO}/rulesets" \
              --input - <<< "$PAYLOAD"
          fi

      - name: Configure main branch – require PRs, no submitter restrictions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          # Protect main so that direct pushes are blocked and all changes must
          # arrive via a pull request. Setting restrictions to null means there
          # is no allow-list restricting who may submit a PR.
          gh api \
            --method PUT \
            -H "Accept: application/vnd.github+json" \
            "/repos/${REPO}/branches/main/protection" \
            --input - <<'EOF'
          {
            "required_status_checks": null,
            "enforce_admins": false,
            "required_pull_request_reviews": {
              "dismiss_stale_reviews": false,
              "require_code_owner_reviews": false,
              "required_approving_review_count": 1
            },
            "restrictions": null
          }
          EOF

      - name: Summary
        run: |
          echo "### Branch and PR permissions configured" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Setting | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Non-main branches | No creation or push restrictions (all roles) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| \`main\` – direct push | Blocked; changes must arrive via PR |" >> "$GITHUB_STEP_SUMMARY"
          echo "| \`main\` – PR submitter | Unrestricted (any user with repository access) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| \`main\` – required approvals | 1 |" >> "$GITHUB_STEP_SUMMARY"
