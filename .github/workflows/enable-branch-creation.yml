name: Enable Branch Creation for All Users

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  enable-branch-creation:
    name: Allow all users to create new branches
    runs-on: ubuntu-latest
    permissions:
      contents: read
      administration: write

    steps:
      - name: Remove rulesets that block branch creation
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          # Fetch all existing rulesets and remove any 'creation' rule from them.
          # The 'creation' rule type is what disables the New Branch button for users.
          RULESETS_JSON=$(gh api \
            -H "Accept: application/vnd.github+json" \
            "/repos/${REPO}/rulesets")

          RULESET_IDS=$(echo "$RULESETS_JSON" | jq -r '.[].id')

          for RULESET_ID in $RULESET_IDS; do
            RULESET_DETAIL=$(gh api \
              -H "Accept: application/vnd.github+json" \
              "/repos/${REPO}/rulesets/${RULESET_ID}")

            RULESET_NAME=$(echo "$RULESET_DETAIL" | jq -r '.name')
            HAS_CREATION=$(echo "$RULESET_DETAIL" | jq '[.rules[].type] | contains(["creation"])')

            if [ "$HAS_CREATION" = "true" ]; then
              echo "Removing 'creation' rule from ruleset '${RULESET_NAME}' (id=${RULESET_ID})"
              UPDATED_PAYLOAD=$(echo "$RULESET_DETAIL" | jq \
                'del(.rules[] | select(.type == "creation")) |
                 {name: .name, target: .target, enforcement: .enforcement,
                  conditions: .conditions, bypass_actors: .bypass_actors, rules: .rules}')

              gh api \
                --method PUT \
                -H "Accept: application/vnd.github+json" \
                "/repos/${REPO}/rulesets/${RULESET_ID}" \
                --input - <<< "$UPDATED_PAYLOAD"

              echo "Updated ruleset '${RULESET_NAME}'"
            else
              echo "Ruleset '${RULESET_NAME}' does not restrict branch creation – skipping"
            fi
          done

      - name: Upsert permissive ruleset for all non-main branches
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          RULESET_NAME="allow-all-branch-creation"

          EXISTING=$(gh api \
            -H "Accept: application/vnd.github+json" \
            "/repos/${REPO}/rulesets" \
            --jq '.[] | select(.name=="'"${RULESET_NAME}"'") | .id')

          # Ruleset with no rules on every branch except main.
          # bypass_actor_id 1 = Read, 2 = Write, 4 = Admin collaborators.
          # An empty rules array means no creation or push restrictions apply,
          # so any collaborator can create a new branch from the GitHub UI.
          PAYLOAD=$(cat <<'EOF'
          {
            "name": "allow-all-branch-creation",
            "target": "branch",
            "enforcement": "active",
            "conditions": {
              "ref_name": {
                "include": ["~ALL"],
                "exclude": ["refs/heads/main"]
              }
            },
            "bypass_actors": [
              {"actor_type": "RepositoryRole", "actor_id": 1, "bypass_mode": "always"},
              {"actor_type": "RepositoryRole", "actor_id": 2, "bypass_mode": "always"},
              {"actor_type": "RepositoryRole", "actor_id": 4, "bypass_mode": "always"}
            ],
            "rules": []
          }
          EOF
          )

          if [ -n "$EXISTING" ]; then
            echo "Updating existing ruleset id=${EXISTING}"
            gh api \
              --method PUT \
              -H "Accept: application/vnd.github+json" \
              "/repos/${REPO}/rulesets/${EXISTING}" \
              --input - <<< "$PAYLOAD"
          else
            echo "Creating new ruleset"
            gh api \
              --method POST \
              -H "Accept: application/vnd.github+json" \
              "/repos/${REPO}/rulesets" \
              --input - <<< "$PAYLOAD"
          fi

          echo "Done – all users can now create new branches via the GitHub UI."
