name: Grant Branch Creation to All Team Members

on:
  workflow_dispatch:
  push:
    branches:
      - main

# ADMIN_TOKEN (a classic PAT with repo scope owned by the repo owner) is REQUIRED
# for this workflow to succeed on a personal (user-owned) repository.
# GitHub's GITHUB_TOKEN cannot be granted administration: write on personal repos,
# so setting that permission in the workflow YAML causes the entire workflow to be
# rejected with 0 jobs.  Instead we rely solely on ADMIN_TOKEN.
#
# To create ADMIN_TOKEN:
#   1. Go to github.com → Settings → Developer settings → Personal access tokens (classic)
#   2. Generate a token with the "repo" scope
#   3. Add it as a repository secret named ADMIN_TOKEN:
#      Settings → Secrets and variables → Actions → New repository secret
permissions:
  contents: read

jobs:
  grant-branch-creation:
    name: Add collaborators and remove branch-creation restrictions
    runs-on: ubuntu-latest

    steps:
      - name: Validate token
        env:
          HAS_ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN != '' }}
        run: |
          if [ "$HAS_ADMIN_TOKEN" != "true" ]; then
            echo "::error::ADMIN_TOKEN secret is not set."
            echo "  On a personal (user-owned) repository, GITHUB_TOKEN cannot manage"
            echo "  collaborators or rulesets. A classic PAT with 'repo' scope is required."
            echo ""
            echo "  To fix:"
            echo "  1. github.com → Settings → Developer settings → Personal access tokens (classic)"
            echo "  2. Generate a token with the 'repo' scope"
            echo "  3. Add it as a repository secret named ADMIN_TOKEN:"
            echo "     Repository → Settings → Secrets and variables → Actions → New repository secret"
            exit 1
          fi
          echo "✓ ADMIN_TOKEN is present"

      - name: Add team members as Write collaborators
        env:
          GH_TOKEN: ${{ secrets.ADMIN_TOKEN || github.token }}
          REPO: ${{ github.repository }}
        run: |
          for USER in JinSui jbhalla86 kaungoo; do
            echo "Inviting ${USER} with write (push) access…"
            gh api \
              --method PUT \
              -H "Accept: application/vnd.github+json" \
              "/repos/${REPO}/collaborators/${USER}" \
              -f permission=push \
              && echo "✓ ${USER} invited/updated" \
              || echo "⚠ Could not add ${USER} – check token permissions"
          done

      - name: Remove 'creation' rules from any blocking rulesets
        env:
          GH_TOKEN: ${{ secrets.ADMIN_TOKEN || github.token }}
          REPO: ${{ github.repository }}
        run: |
          RULESETS=$(gh api \
            -H "Accept: application/vnd.github+json" \
            "/repos/${REPO}/rulesets" 2>/dev/null || echo "[]")

          echo "$RULESETS" | jq -r '.[].id' | while read -r RULESET_ID; do
            DETAIL=$(gh api \
              -H "Accept: application/vnd.github+json" \
              "/repos/${REPO}/rulesets/${RULESET_ID}")

            NAME=$(echo "$DETAIL" | jq -r '.name')
            HAS_CREATION=$(echo "$DETAIL" | jq '[.rules[]?.type] | contains(["creation"]) // false')

            if [ "$HAS_CREATION" = "true" ]; then
              echo "Removing 'creation' rule from ruleset '${NAME}' (id=${RULESET_ID})…"
              UPDATED=$(echo "$DETAIL" | jq \
                'del(.rules[] | select(.type == "creation")) |
                 {name: .name, target: .target, enforcement: .enforcement,
                  conditions: .conditions, bypass_actors: .bypass_actors, rules: .rules}')
              gh api \
                --method PUT \
                -H "Accept: application/vnd.github+json" \
                "/repos/${REPO}/rulesets/${RULESET_ID}" \
                --input - <<< "$UPDATED" \
                && echo "✓ Ruleset '${NAME}' updated" \
                || echo "⚠ Could not update ruleset '${NAME}' – check token permissions"
            else
              echo "Ruleset '${NAME}' has no 'creation' restriction – skipping"
            fi
          done

      - name: Summary
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<'SUMMARY'
          ### Branch creation access configured

          | Action | Details |
          |--------|---------|
          | Collaborators invited | JinSui, jbhalla86, kaungoo (Write / push access) |
          | Ruleset fix | Any `creation` rule removed from active rulesets |
          SUMMARY
